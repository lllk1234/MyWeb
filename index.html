<!DOCTYPE html>
<html>
    <head>
        <title>서시</title>
        <meta name="viewport" content="user-scalable=no,initial-scale=1">
        <style>
            .box{
                max-width:800px;
                margin:40px auto;
                padding:30px;background: linear-gradient(90deg,rgba(42, 123, 155, 1) 0%, rgba(87, 199, 133, 1) 30%, rgba(237, 221, 83, 1) 74%);
                text-align: center;
                border-radius: 20px;
                font-size: 1.5em;
                font-family: '궁서체';
            }

            h1{
                color:navy;
            }
            h3{
                color:gray;
                font-style: italic;
            }

            @media (max-width: 450px){
                .box{
                    padding:20px;
                    font-size: 1.2em;
                }

            }
        </style>

    </head>

    <body>
        <div class="box">
        <h1>서시</h1>
        
        <p>
        죽는날 까지 하늘을 우러러<br>
        한점 부끄럼이 없기를<br>
        잎새에 이는 바람에도<br>
        나는 괴로워 했다<br>
        별을 노래하는 마음으로<br>
        모든 죽어가는 것을 사랑해야지<br>
        그리고 나에게 주어진 길을<br>
        걸어가야겠다.
        </p>

        <h3>-윤동주-</h3>
        </div>
    </body>
</html>
